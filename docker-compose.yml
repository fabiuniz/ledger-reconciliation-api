version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ledger-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ledger_reconciliation_db
      POSTGRES_USER: tqi_fintech_user
      POSTGRES_PASSWORD: secure_ledger_password_123
    volumes:
      - pgdata:/var/lib/postgresql/data

  localstack:
    image: localstack/localstack:3.0.2
    container_name: ledger-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sqs,sns
      - AWS_DEFAULT_REGION=sa-east-1

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: ledger-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: ledger-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: ledger_zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

volumes:
  pgdata: